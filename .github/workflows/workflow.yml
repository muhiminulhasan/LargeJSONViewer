name: build-large-json-viewer

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    paths-ignore:
      - "README.md"
      - "src/locale/**"
      - "scripts/**"
      - "res/**"
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: [windows-latest]
        lazarus-versions: [stable]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: ${{ matrix.lazarus-versions }}
        include-packages: "VirtualTreeViewV5"
        with-cache: false

    - name: Build the Main App x64 (Windows)
      if: ${{ matrix.operating-system == 'windows-latest' }}
      run: |
        lazbuild -B --bm=Win64 "LargeJSONViewer.lpi"

    - name: Upload binary Windows x64
      if: ${{ (matrix.operating-system == 'windows-latest') && (matrix.lazarus-versions == 'stable') }}
      uses: actions/upload-artifact@v4
      with:
        name: LargeJSONViewer-win64
        path: LargeJSONViewer.exe

  build-installer:
    name: Build NSIS Installer (Windows)
    runs-on: windows-latest
    needs: build
    if: ${{ contains(github.ref, '/tags/') }}

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download Windows x64 binary
      uses: actions/download-artifact@v4
      with:
        name: LargeJSONViewer-win64
        path: installer-work-x64

    - name: Install NSIS
      run: choco install nsis -y

    - name: Build NSIS Installer (x64)
      run: |
        Copy-Item "installer-work-x64\LargeJSONViewer.exe" "scripts\LargeJSONViewer.exe" -Force
        Copy-Item "LargeJSONViewer.ico" "scripts\LargeJSONViewer.ico" -Force
        & "C:\Program Files (x86)\NSIS\makensis.exe" /DARCH=x64 "scripts\installer.nsi"
        Copy-Item "scripts\LargeJSONViewer_x64_Setup.exe" "LargeJSONViewer_x64_Setup.exe" -Force

    - name: Upload installer artifact (x64)
      uses: actions/upload-artifact@v4
      with:
        name: LargeJSONViewer-installer-x64
        path: LargeJSONViewer_x64_Setup.exe

  package-release:
    if: contains(github.ref, '/tags/')

    name: Package and create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, build-installer]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set output
      id: vars
      run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

    - name: Download the Release binaries
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List files
      run: find artifacts -type f | sort

    - name: Create release files
      run: |
        mkdir -p release-out

        zip -j release-out/LargeJSONViewer-${{ steps.vars.outputs.tag }}-x86_64-win64.zip \
          artifacts/LargeJSONViewer-win64/LargeJSONViewer.exe

        cp artifacts/LargeJSONViewer-installer-x64/LargeJSONViewer_x64_Setup.exe \
          release-out/LargeJSONViewer-${{ steps.vars.outputs.tag }}-x86_64-win64-Setup.exe

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        name: LargeJSONViewer ${{ steps.vars.outputs.tag }}
        body_path: release.md
        files: |
          release-out/*.zip
          release-out/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
